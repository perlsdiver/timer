<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Timer</title>
  <link rel="icon" href="assets/site-icon.svg">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/timer-styles.css">
  <link rel="stylesheet" href="css/brutalist.css">
  <link rel="stylesheet" href="css/dark-brutalist.css">
  <style>
    /* quick fix - controls weren't centering */
    .controls {
      display: flex; gap: 10px; justify-content: center;
      margin-top: 20px;
    }
    .controls button {
      min-width: 90px;
    }
    #mode-label {
      font-size: 14px; text-transform: uppercase;
      letter-spacing: 0.15em; color: #888; margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <header>
    <img src="assets/site-icon.svg" alt="Logo" class="header-logo">
    <h1>Focus Timer</h1>
  </header>
  <main>
    <section class="card goal-card">
      <div class="goal-input-container">
        <label for="goal-input">Focusing on:</label>
        <input type="text" id="goal-input" placeholder="e.g., Coding a feature..." maxlength="50">
      </div>
      <div id="goal-display" class="hidden">Current Goal: <span id="current-goal-text"></span></div>
    </section>
    <section class="card timer-card">
      <div id="mode-label">Focus</div>
      <div class="timer-display" id="timer">25:00</div>
      <div class="controls">
        <button id="start-btn">Start</button>
        <button id="pause-btn" disabled>Pause</button>
        <button id="reset-btn">Reset</button>
      </div>
    </section>
    <section class="card">
      <h2>Sessions</h2>
      <div id="session-log"><p class="empty-msg">No completed sessions yet.</p></div>
    </section>
  </main>
  <footer>
    <p>Built at a <span id="workshop-name">CAIL Workshop</span></p>
  </footer>
  <div class="theme-toggle-container">
    <button id="theme-toggle-btn">Toggle Style</button>
  </div>
  <script src="js/timer.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/app-init.js"></script>
  <script src="js/theme.js"></script>
</body>
</html>
